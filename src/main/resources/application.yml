spring:
  application:
    name: backend
  elasticsearch:
    uris: ${ES_URL:http://localhost:9200}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/knewit}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  websocket:
    endpoint-path: ${WEB_SOCKET_ENDPOINT_PATH:/ws}
    broker-prefix: ${WEB_SOCKET_BROKER_PREFIX:/app}
    topic-prefix: ${WEB_SOCKET_TOPIC_PREFIX:/topic}
    queue-prefix: ${WEB_SOCKET_QUEUE_PREFIX:/queue}
    allowed-origins: ${WEB_SOCKET_ALLOWED_ORIGINS:http://localhost:5173}